
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student DevOps Project</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 30px;
    width: 400px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease-in-out;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    color: #2c3e50;
}

h2 {
    color: #3498db;
}

p {
    font-size: 18px;
    margin: 8px 0;
}

/* Success Text */
.success {
    color: blue;
    font-weight: bold;
    margin-top: 15px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #3498db;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2c3e50;
}
</style>

<script>
function showMessage() {
    alert("🎉 CI/CD Pipeline is working perfectly!");
}
</script>

</head>

<body>

<div class="container">
    <h1>Hello DevOps </h1>

    <h2>CVR college of Engineering</h2>
    <p><strong>Name:</strong> Amulya</p>
    <p><strong>Roll No:</strong> 24B81A66D6</p>

    <h3 class="success">CI/CD Pipeline Working Successfully </h3>

    <button onclick="showMessage()">Click Me</button>
</div>

</body>
</html>
